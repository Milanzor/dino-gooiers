<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dino Gooiers</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@700;800;900&family=Baloo+2:wght@600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Matter.js physics engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <!-- Game styles -->
  <link rel="stylesheet" href="game.css" />
  <!-- App icon -->
  <link rel="icon" type="image/png" href="assets/ui/appicon.png" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a0e2e;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #ui-root {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #screen-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
    }

    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1a0e2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 24px;
    }

    #loadingOverlay .logo {
      font-family: 'Bungee', cursive;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #f5c842;
      text-shadow:
        0 0 20px rgba(245, 200, 66, 0.6),
        0 4px 0 #c47a00,
        0 6px 12px rgba(0, 0, 0, 0.6);
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.1;
    }

    #loadingOverlay .logo span {
      display: block;
      color: #ff8c2a;
      font-size: 0.55em;
      text-shadow:
        0 0 12px rgba(255, 140, 42, 0.5),
        0 3px 0 #a04800,
        0 5px 10px rgba(0, 0, 0, 0.5);
      letter-spacing: 0.12em;
    }

    #loadingOverlay .loading-bar-track {
      width: min(320px, 70vw);
      height: 8px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      overflow: hidden;
    }

    #loadingOverlay .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f5c842, #ff8c2a);
      border-radius: 4px;
      transition: width 0.3s ease;
      animation: loadingPulse 1.4s ease-in-out infinite;
    }

    @keyframes loadingPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    #loadingOverlay .loading-text {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Main game canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- UI overlay layer (pointer-events managed per-child by JS) -->
  <div id="ui-root"></div>

  <!-- Non-canvas screen layer (menus, dialogs, etc.) -->
  <div id="screen-container"></div>

  <!-- Loading overlay — hidden by JS once assets are ready -->
  <div id="loadingOverlay">
    <div class="logo">
      DINO GOOIERS
      <span>Bouw ze plat!</span>
    </div>
    <div class="loading-bar-track">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
    <div class="loading-text" id="loadingText">Laden...</div>
  </div>

  <!-- Game modules (order matters) -->
  <script src="js/engine.js"></script>
  <script src="js/dinos.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/gameplay.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
