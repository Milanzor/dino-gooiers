name: Deploy and Test

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  browser-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Install Puppeteer
        working-directory: test
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Wait for Pages CDN propagation
        run: sleep 25

      - name: Run browser smoke test
        working-directory: test
        env:
          GAME_URL: ${{ needs.deploy.outputs.page_url || 'https://milanzor.github.io/dino-gooiers/' }}
          SHOTS_DIR: ${{ github.workspace }}/screenshots
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: node e2e.js 2>&1 | tee /tmp/e2e-output.txt; exit ${PIPESTATUS[0]}

      - name: Write test summary
        if: always()
        run: |
          echo "## Dino Gooiers — Browser Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/e2e-output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/e2e-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No test output captured." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Screenshots" >> $GITHUB_STEP_SUMMARY
          for f in ${{ github.workspace }}/screenshots/*.png; do
            name=$(basename "$f")
            echo "- [\`$name\`](https://raw.githubusercontent.com/Milanzor/dino-gooiers/test-results/screenshots/$name)" >> $GITHUB_STEP_SUMMARY
          done

      - name: Publish screenshots to test-results branch
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin test-results 2>/dev/null || true
          git checkout -B test-results
          mkdir -p screenshots
          cp ${{ github.workspace }}/screenshots/*.png screenshots/ 2>/dev/null || true
          [ -f /tmp/e2e-output.txt ] && cp /tmp/e2e-output.txt screenshots/test-output.txt || true
          git add -f screenshots/
          git commit -m "Browser test screenshots $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push origin test-results --force

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-screenshots
          path: screenshots/
          retention-days: 30
