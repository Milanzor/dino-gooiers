name: Deploy and Test

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  browser-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer and download Chrome
        working-directory: test
        run: |
          npm install
          npx puppeteer browsers install chrome

      - name: Wait for Pages CDN propagation
        run: sleep 25

      - name: Run browser smoke test
        id: smoke
        working-directory: test
        env:
          GAME_URL: ${{ needs.deploy.outputs.page_url }}
          SHOTS_DIR: ${{ github.workspace }}/screenshots
        run: |
          echo "## Dino Gooiers — Browser Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $GAME_URL" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          node e2e.js 2>&1 | tee /tmp/e2e-output.txt
          EXIT=${PIPESTATUS[0]}
          cat /tmp/e2e-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-screenshots
          path: screenshots/
          retention-days: 30

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: /tmp/e2e-output.txt
          retention-days: 30
