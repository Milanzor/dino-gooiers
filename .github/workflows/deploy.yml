name: Deploy and Test

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  browser-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Print Chrome path
        run: echo "Chrome at ${{ steps.setup-chrome.outputs.chrome-path }}"

      - name: Install Puppeteer (no browser download needed)
        working-directory: test
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm install

      - name: Wait for Pages CDN propagation
        run: sleep 25

      - name: Run browser smoke test
        working-directory: test
        env:
          GAME_URL: ${{ needs.deploy.outputs.page_url }}
          SHOTS_DIR: ${{ github.workspace }}/screenshots
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          echo "## Dino Gooiers — Browser Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $GAME_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Chrome:** $CHROME_PATH" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          node e2e.js 2>&1 | tee /tmp/e2e-output.txt
          EXIT=${PIPESTATUS[0]}
          cat /tmp/e2e-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-screenshots
          path: screenshots/
          retention-days: 30

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: /tmp/e2e-output.txt
          retention-days: 30
